<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nour Beyond Time - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .actions-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #dfb76c;
            color: #dfb76c;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(223, 183, 108, 0.05);
        }

        .login-btn:hover {
            background: rgba(223, 183, 108, 0.1);
            box-shadow: 0 0 25px rgba(223, 183, 108, 0.2);
            transform: translateY(-2px);
        }

        .back-home-link {
            font-family: 'Poppins', sans-serif;
            color: #8a7b6e;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            margin-left: 10px;
        }

        .back-home-link:hover {
            color: #dfb76c;
        }

        @media (max-width: 600px) {
            .actions-wrapper {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
                gap: 15px;
            }
            .login-btn {
                width: 100%;
            }
            .back-home-link {
                text-align: center;
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="booking-page">
    <div class="bg-overlay"></div>

    <div class="booking-container">
        <div class="logo-area">
            <img src="images/gold.jpg" alt="Nour Beyond Time Logo" class="booking-logo">
            <h2>NOUR BEYOND TIME</h2>
        </div>

        <div class="form-header">
            <h1>DESIGN YOUR JOURNEY THROUGH TIME</h1>
            <p>Enter your credentials to secure your golden ticket to the ancient world.</p>
        </div>

        <form class="booking-form" id="authForm" action="destinations.html" method="GET">
    
            <div class="form-grid">
                <div class="input-group">
                    <label for="explorer-name">EXPLORER NAME</label>
                    <input type="text" id="explorer-name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="explorer-email">EMAIL ADDRESS</label>
                    <input type="email" id="explorer-email" placeholder="username@domain.com" required>
                </div>

                <div class="input-group">
                    <label for="explorer-password">PASSWORD</label>
                    <input type="password" id="explorer-password" placeholder="Enter your password" required>
                </div>

                <div class="input-group">
                    <label for="explorer-age">YOUR AGE</label>
                    <input type="number" id="explorer-age" placeholder="e.g. 21" min="1" max="120" required>
                </div>

                <div class="input-group" class="full-width">
                    <label for="explorer-country">YOUR COUNTRY</label>
                    <select id="explorer-country" required>
                        <option value="" disabled selected hidden>Select your country</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Saudi Arabia">Saudi Arabia</option>
                        <option value="UAE">United Arab Emirates</option>
                        <option value="Kuwait">Kuwait</option>
                        <option value="Qatar">Qatar</option>
                        <option value="USA">United States</option>
                        <option value="UK">United Kingdom</option>
                        <option value="Germany">Germany</option>
                        <option value="France">France</option>
                        <option value="Italy">Italy</option>
                        <option value="Spain">Spain</option>
                        <option value="Russia">Russia</option>
                        <option value="China">China</option>
                        <option value="Japan">Japan</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Netherlands">Netherlands</option>
                        <option value="Switzerland">Switzerland</option>
                        <option value="Brazil">Brazil</option>
                        <option value="India">India</option>
                    </select>
                </div>
            </div>

            <div class="actions-wrapper">
                <button type="submit" class="submit-btn" style="margin-top: 0;">GO →</button>
                <a href="login.html" class="login-btn">LOG IN EXISTING ACCOUNT</a>
                <a href="index.html" class="back-home-link">← Return to Main Gates</a>
            </div>
        </form>
        
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', function(e) {
            const name = document.getElementById('explorer-name').value;
            const email = document.getElementById('explorer-email').value;
            const password = document.getElementById('explorer-password').value;
            const age = document.getElementById('explorer-age').value;
            const country = document.getElementById('explorer-country').value;

            localStorage.setItem('explorerName', name);
            localStorage.setItem('explorerEmail', email);
            localStorage.setItem('explorerPassword', password);
            localStorage.setItem('explorerAge', age);
            localStorage.setItem('explorerCountry', country);
        });
    </script>
    <iframe src="audio-player.html" id="audioFrame" style="display:none;"></iframe>
</body>
</html>
